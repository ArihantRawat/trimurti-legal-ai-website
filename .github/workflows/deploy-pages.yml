name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Attempt GitHub Pages deployment. Use only when Pages is enabled for this repository."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release --base-href "/trimurti-legal-ai-website/"

      - name: Configure Pages
        if: ${{ github.event.repository.visibility == 'public' || inputs.deploy_pages == true }}
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        if: ${{ github.event.repository.visibility == 'public' || inputs.deploy_pages == true }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    name: Deploy Pages
    needs: build
    if: ${{ github.event.repository.visibility == 'public' || inputs.deploy_pages == true }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
